name: Demo workflow

on:
  workflow_dispatch:
    inputs:
      mensaje:
        description: "Mensaje de texto a imprimir"
        required: true
        default: "Hola desde GitHub Actions"
        type: string

jobs:
  imprimir-mensaje:
    runs-on: ubuntu-latest

    steps:
      - name: Imprimir mensaje por consola
        run: echo "${{ inputs.mensaje }}"
